<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root {
    --ink: #0b2e3d;
    --sand: #f3ecdd;
    --sea: #1f7a8c;
    --sea-deep: #0f4c5c;
    --coral: #e5745a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, var(--sand) 0%, #eae1cd 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  h1 {
    font-size: 1.6rem;
    letter-spacing: 0.02em;
    margin-bottom: 0.25rem;
  }

  p.sub {
    margin-top: 0;
    margin-bottom: 2rem;
    color: var(--sea-deep);
    opacity: 0.75;
    font-size: 0.95rem;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  a.btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    background: var(--sea);
    color: white;
    text-decoration: none;
    font-weight: 600;
    border-radius: 10px;
    transition: transform 0.15s ease, background 0.15s ease;
    border: 2px solid transparent;
  }

  a.btn img {
    width: 32px;
    height: 32px;
    object-fit: contain;
    border-radius: 6px;
    background: white;
    flex-shrink: 0;
  }

  a.btn:hover {
    background: var(--sea-deep);
    transform: translateY(-2px);
  }

  a.btn:focus-visible {
    outline: 3px solid var(--coral);
    outline-offset: 2px;
  }

  a.btn.alt {
    background: transparent;
    border: 2px solid var(--sea);
    color: var(--sea-deep);
  }

  a.btn.alt:hover {
    background: var(--sea);
    color: white;
  }

  footer {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    opacity: 0.5;
  }

  .links.locked a.btn {
    pointer-events: none;
    opacity: 0.4;
    cursor: not-allowed;
  }

  .verify-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
    min-height: 65px;
    align-items: center;
  }

  .verify-note {
    font-size: 0.8rem;
    color: var(--sea-deep);
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>saltlife092315</h1>
    <p class="sub">placeholder landing page — replace these links</p>

    <div class="verify-wrap">
      <div class="cf-turnstile"
           data-sitekey="0x4AAAAAADxikIq4IP1PB3MD"
           data-callback="onVerified"
           data-theme="light"></div>
    </div>
    <p class="verify-note" id="verifyNote">Please complete the check above to unlock the links.</p>

    <div class="links locked" id="linksBox">
      <a class="btn" href="#" target="_blank" rel="noopener">
        <img src="assets/onlyfans.png" alt="">
        <span>OnlyFans</span>
      </a>
      <a class="btn" href="#" target="_blank" rel="noopener">
        <img src="assets/fansly.png" alt="">
        <span>Fansly</span>
      </a>
      <a class="btn" href="#" target="_blank" rel="noopener">
        <img src="assets/pantydeal.webp" alt="">
        <span>Pantydeal</span>
      </a>
      <a class="btn" href="#" target="_blank" rel="noopener">
        <img src="assets/sofiagray.jpg" alt="">
        <span>SofiaGray</span>
      </a>
      <a class="btn alt" href="#" target="_blank" rel="noopener">
        <img src="assets/snifffr.jpg" alt="">
        <span>Snifffr</span>
      </a>
    </div>

    <footer>edit index.html to add your real links</footer>
  </div>

  <script>
    function onVerified(token) {
      document.getElementById('linksBox').classList.remove('locked');
      document.getElementById('verifyNote').style.display = 'none';
    }
  </script>
</body>
</html>
